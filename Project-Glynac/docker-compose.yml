version: "3.9"

services:

  # ── 1. PostgreSQL database ─────────────────────────────────────────────────
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       customer_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── 2. Flask mock server ───────────────────────────────────────────────────
  mock-server:
    build: ./mock-server
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy   # wait until Postgres is ready

  # ── 3. FastAPI pipeline service ───────────────────────────────────────────
  pipeline-service:
    build: ./pipeline-service
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mock-server:
        condition: service_started
    environment:
      DATABASE_URL:  postgresql://postgres:password@postgres:5432/customer_db
      FLASK_BASE_URL: http://mock-server:5000
